<!DOCTYPE html>
<html>
<body>

<h2>🛒 My Shop</h2>

<div id="products"></div>

<script>

// ✅ WhatsApp number (तुम्हारा नंबर सेट हो गया)
let myNumber = "919752144747";

// ✅ Products
let products = [
  {
    name: "Surya LED Bulb",
    price: 100,
    image: "https://images.unsplash.com/photo-1621905252507-b35492cc74b4"
  }
];

// ✅ Show products
let box = "";

for(let i = 0; i < products.length; i++){
  box += `
    <div style="border:1px solid black; padding:10px; margin:10px; width:200px;">
      <img src="${products[i].image}" width="150">
      <h3>${products[i].name}</h3>
      <p>₹${products[i].price}</p>

      <button onclick="orderNow('${products[i].name}', ${products[i].price})">
        Order on WhatsApp
      </button>
    </div>
  `;
}

document.getElementById("products").innerHTML = box;

// ✅ WhatsApp Order Function
function orderNow(name, price){

  let message = "Hello, मुझे order करना है:%0A"
              + "Product: " + name + "%0A"
              + "Price: ₹" + price;

  let url = "https://wa.me/" + myNumber + "?text=" + message;

  window.open(url, "_blank");
}

</script>

</body>
</html>
